{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBIX</title>
    <style>
        :root {
            --ink: #17191f;
            --muted: #667085;
            --line: rgba(216, 224, 236, 0.86);
            --blue: #2563eb;
            --violet: #8b5cf6;
            --cyan: #14b8ff;
            --rose: #d946ef;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: Arial, "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 50% 34%, rgba(255, 255, 255, 0.98) 0 9%, rgba(255, 255, 255, 0) 10%),
                radial-gradient(ellipse at 50% 36%, rgba(20, 184, 255, 0.18) 0 18%, rgba(20, 184, 255, 0) 42%),
                radial-gradient(ellipse at 50% 38%, rgba(139, 92, 246, 0.16) 0 24%, rgba(139, 92, 246, 0) 50%),
                linear-gradient(180deg, #fbfcff 0%, #eef4f9 58%, #e7edf5 100%);
        }

        .stage {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 24px;
        }

        .portal {
            display: grid;
            width: min(720px, 100%);
            gap: 22px;
            justify-items: center;
            text-align: center;
        }

        .logo {
            width: 96px;
            height: 96px;
            border-radius: 22px;
            object-fit: cover;
            box-shadow: 0 24px 60px rgba(37, 99, 235, 0.18);
        }

        h1 {
            margin: 0;
            font-size: clamp(48px, 11vw, 104px);
            line-height: 0.9;
            color: transparent;
            background: linear-gradient(100deg, var(--cyan), var(--blue) 45%, var(--rose));
            background-clip: text;
            -webkit-background-clip: text;
            font-weight: 900;
        }

        .copy {
            max-width: 560px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(16px, 2.4vw, 20px);
            line-height: 1.55;
            font-weight: 700;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .button {
            display: inline-flex;
            min-height: 46px;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.92);
            color: var(--ink);
            font-weight: 900;
            text-decoration: none;
            box-shadow: 0 12px 26px rgba(25, 31, 44, 0.07);
        }

        .button.primary {
            border-color: transparent;
            background: linear-gradient(135deg, var(--blue), var(--violet) 55%, var(--rose));
            color: #fff;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            width: min(560px, 100%);
            gap: 8px;
        }

        .stat {
            min-height: 72px;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.72);
            box-shadow: 0 10px 24px rgba(25, 31, 44, 0.05);
        }

        .stat strong,
        .stat span {
            display: block;
        }

        .stat strong {
            font-size: 20px;
        }

        .stat span {
            margin-top: 4px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 800;
        }

        @media (max-width: 560px) {
            .stats { grid-template-columns: 1fr; }
            .actions { width: 100%; }
            .button { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="portal" aria-label="ORBIX 입장">
            <img class="logo" src="{% static 'posts/orbix-logo.png' %}?v=20260502b" alt="ORBIX">
            <h1>ORBIX</h1>
            <p class="copy">관심사가 궤도가 되고, 사람들의 글과 대화가 피드로 흐르는 커뮤니티 공간입니다.</p>
            <div class="actions">
                <a class="button primary" href="{% url 'home' %}">커뮤니티 입장</a>
                {% if user.is_authenticated %}
                    <a class="button" href="{% url 'profile_feed' user.username %}">내 피드</a>
                {% else %}
                    <a class="button" href="{% url 'login' %}">로그인</a>
                {% endif %}
            </div>
            <div class="stats" aria-label="ORBIX 기능 요약">
                <div class="stat">
                    <strong>Orbit</strong>
                    <span>주제별 게시판</span>
                </div>
                <div class="stat">
                    <strong>Feed</strong>
                    <span>전체/구독 피드</span>
                </div>
                <div class="stat">
                    <strong>Signal</strong>
                    <span>좋아요와 알림</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
