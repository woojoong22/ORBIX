{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a1024">
    <title>ORBIX</title>
    <link rel="manifest" href="{% url 'webmanifest' %}">
    <link rel="apple-touch-icon" href="{% static 'posts/orbix-logo.png' %}">
    <style>
        :root {
            --ink: #f8fbff;
            --muted: #a9b7cc;
            --line: rgba(255, 255, 255, 0.16);
            --panel: rgba(8, 13, 28, 0.62);
            --blue: #57a9ff;
            --cyan: #38e7ff;
            --violet: #9b7cff;
            --rose: #ff6bd6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            font-family: Arial, "Noto Sans KR", sans-serif;
            background:
                radial-gradient(circle at 16% 22%, rgba(56, 231, 255, 0.35) 0 1px, transparent 2px),
                radial-gradient(circle at 72% 18%, rgba(255, 255, 255, 0.42) 0 1px, transparent 2px),
                radial-gradient(circle at 82% 68%, rgba(255, 107, 214, 0.28) 0 1px, transparent 2px),
                radial-gradient(circle at 32% 76%, rgba(255, 255, 255, 0.36) 0 1px, transparent 2px),
                radial-gradient(ellipse at 50% 42%, rgba(87, 169, 255, 0.34), transparent 34%),
                radial-gradient(ellipse at 50% 48%, rgba(155, 124, 255, 0.28), transparent 48%),
                linear-gradient(180deg, #050814 0%, #0a1024 54%, #10172f 100%);
            overflow-x: hidden;
        }

        body::before,
        body::after {
            content: "";
            position: fixed;
            left: 50%;
            top: 44%;
            width: min(920px, 112vw);
            height: min(300px, 38vw);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%) rotate(-8deg);
            pointer-events: none;
        }

        body::after {
            width: min(700px, 94vw);
            height: min(210px, 30vw);
            border-color: rgba(87, 169, 255, 0.22);
            transform: translate(-50%, -50%) rotate(8deg);
        }

        .stage {
            display: grid;
            min-height: 100vh;
            place-items: center;
            padding: 28px;
        }

        .portal {
            display: grid;
            width: min(720px, 100%);
            gap: 18px;
            justify-items: center;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: transparent;
            background: linear-gradient(100deg, var(--cyan), var(--blue) 42%, var(--rose));
            background-clip: text;
            -webkit-background-clip: text;
            font-size: clamp(54px, 12vw, 112px);
            font-weight: 900;
            line-height: 0.9;
        }

        .copy {
            max-width: 560px;
            margin: 0;
            color: var(--muted);
            font-size: clamp(15px, 2.2vw, 19px);
            font-weight: 700;
            line-height: 1.55;
        }

        .orbit-form {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            width: min(560px, 100%);
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(14px);
        }

        .orbit-input {
            min-width: 0;
            height: 48px;
            padding: 0 14px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            color: var(--ink);
            font: inherit;
            font-size: 16px;
            font-weight: 800;
            outline: 0;
        }

        .orbit-input::placeholder {
            color: rgba(248, 251, 255, 0.54);
        }

        .button {
            display: inline-flex;
            min-height: 48px;
            align-items: center;
            justify-content: center;
            padding: 0 18px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: var(--ink);
            font: inherit;
            font-weight: 900;
            text-decoration: none;
            cursor: pointer;
        }

        .button.primary {
            border-color: transparent;
            background: linear-gradient(135deg, #2563eb, #8b5cf6 55%, #d946ef);
            color: #fff;
            box-shadow: 0 16px 36px rgba(87, 169, 255, 0.22);
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .hint {
            margin: -4px 0 0;
            color: rgba(248, 251, 255, 0.58);
            font-size: 12px;
            font-weight: 800;
        }

        @media (max-width: 560px) {
            .stage { padding: 18px; }
            .orbit-form { grid-template-columns: 1fr; }
            .actions,
            .button { width: 100%; }
        }
    </style>
</head>
<body>
    <main class="stage">
        <section class="portal" aria-label="ORBIX 입장">
            <h1>ORBIX</h1>
            <p class="copy">관심사를 입력하면 하나의 궤도가 열립니다. 게시판을 만들고, 같은 궤도를 도는 사람들과 바로 대화하세요.</p>
            <form class="orbit-form" method="post">
                {% csrf_token %}
                <input type="hidden" name="action" value="create_board">
                <input class="orbit-input" name="board_name" type="search" placeholder="게시판 또는 관심사 입력" autocomplete="off" autocapitalize="off" spellcheck="false" required>
                <button class="button primary" type="submit">궤도 열기</button>
            </form>
            <p class="hint">예: 인공지능, 여행, 주식, 맛집, 게임</p>
            <div class="actions">
                <a class="button" href="{% url 'home' %}">커뮤니티 홈</a>
                {% if user.is_authenticated %}
                    <a class="button" href="{% url 'profile_feed' user.username %}">내 피드</a>
                {% else %}
                    <a class="button" href="{% url 'login' %}">로그인</a>
                {% endif %}
            </div>
        </section>
    </main>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
            navigator.serviceWorker.register("{% url 'service_worker' %}").catch(() => {});
        });
    }
</script>
</body>
</html>
