<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 · Orbix</title>
    <style>
        body {
            display: grid;
            place-items: center;
            min-height: 100vh;
            margin: 0;
            background: #eef1f5;
            color: #16181d;
            font-family: Arial, "Noto Sans KR", sans-serif;
        }

        main {
            width: min(420px, calc(100% - 24px));
            padding: 24px;
            border: 1px solid #d9dee8;
            border-radius: 8px;
            background: #fff;
        }

        h1 {
            margin: 0 0 18px;
            font-size: 26px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input {
            width: 100%;
            height: 42px;
            margin-bottom: 14px;
            padding: 0 12px;
            border: 1px solid #d9dee8;
            border-radius: 8px;
            font: inherit;
            box-sizing: border-box;
        }

        button,
        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border-radius: 8px;
            font-weight: 700;
            text-decoration: none;
        }

        button {
            width: 100%;
            border: 0;
            background: #e5484d;
            color: #fff;
            cursor: pointer;
            font: inherit;
        }

        a {
            margin-top: 12px;
            color: #16181d;
        }

        .errorlist {
            padding-left: 20px;
            color: #bf3035;
        }
    </style>
</head>
<body>
    <main>
        <h1>로그인</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">로그인</button>
        </form>
        <a href="{% url 'signup' %}">계정 만들기</a>
        <a href="{% url 'home' %}">홈으로</a>
    </main>
</body>
</html>
