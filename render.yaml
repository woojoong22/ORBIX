services:
  - type: web
    name: orbix
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && gunicorn mysite.wsgi:application
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_USE_WHITENOISE
        value: "True"
      - key: DJANGO_SECURE_COOKIES
        value: "True"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: orbix-db
          property: connectionString

databases:
  - name: orbix-db
    databaseName: orbix
    user: orbix
